<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>viralmemo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fffdfb;--surface:#f7f4ef;--border:#e8e2d8;--border-strong:#d3ccc0;
  --border-stronger:#a89e8e;--text:#241f19;--text-secondary:#6f6559;
  --text-muted:#a89e8e;--accent:#FF5A36;--accent-soft:#FFE7DE;--danger:#E24B4A;--radius:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1b1815;--surface:#242019;--border:#3a352c;--border-strong:#544c3e;
  --border-stronger:#786d59;--text:#f3ede4;--text-secondary:#bdb2a0;--text-muted:#786d59;
  --accent-soft:#3a2620;
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;overflow:hidden;}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:#FCF6F0;z-index:100;align-items:center;justify-content:center;}
#login-screen.visible{display:flex;}
.login-card{width:280px;min-height:320px;background:#FCF6F0;border-radius:18px;border:0.5px solid #e8ded2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden;}
.login-bg-orange{position:absolute;bottom:-40px;left:-30px;width:130px;height:130px;border-radius:50%;background:#FFE4D6;opacity:0.8;}
.login-bg-pink{position:absolute;top:12%;right:-30px;width:100px;height:100px;border-radius:50%;background:#FFE0EC;opacity:0.6;}
.login-bg-yellow{position:absolute;top:-30px;left:-20px;width:90px;height:90px;border-radius:50%;background:#FFF3D6;opacity:0.85;}
.login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.login-icon{width:52px;height:52px;border-radius:16px;background:#fff;border:0.5px solid #e8ded2;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:26px;}
.login-logo{font-size:24px;font-weight:700;color:#241f19;letter-spacing:-0.5px;margin-bottom:6px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:12px;color:#8a8073;margin-bottom:22px;}
.google-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9px;border:0.5px solid #e8ded2;background:#fff;color:#241f19;cursor:pointer;font-size:13px;}
.google-btn:hover{background:#f7f1ea;}
.google-btn svg{width:16px;height:16px;flex-shrink:0;}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;transition:transform 0.2s;}
#sidebar.hidden{transform:translateX(-220px);}
.sidebar-header{padding:14px 12px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-header h1{font-size:13px;font-weight:700;letter-spacing:-0.3px;flex:1;}
.user-avatar{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);cursor:pointer;object-fit:cover;}
.user-avatar-placeholder{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;flex-shrink:0;}
.map-list{flex:1;overflow-y:auto;padding:8px 6px;}
.map-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);border:0.5px solid transparent;margin-bottom:2px;}
.map-item:hover{background:var(--bg);color:var(--text);}
.map-item.active{background:var(--bg);color:var(--text);border-color:var(--border);}
.map-item-icon{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.map-item-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.map-del{opacity:0;width:16px;height:16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;flex-shrink:0;border-radius:3px;display:flex;align-items:center;justify-content:center;}
.map-item:hover .map-del,.map-item.active .map-del{opacity:1;}
.map-del:hover{color:var(--danger);}
.sidebar-footer{padding:10px 6px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.new-map-btn{width:100%;padding:7px 10px;border:0.5px dashed var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;}
.new-map-btn:hover{background:var(--bg);color:var(--text-secondary);}
.logout-btn{width:100%;padding:6px 10px;border:none;border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;text-align:left;}
.logout-btn:hover{color:var(--danger);}
.sync-status{font-size:10px;color:var(--text-muted);padding:0 10px 4px;min-height:14px;}

/* MAIN */
#main{margin-left:220px;display:flex;flex-direction:column;height:100vh;flex:1;transition:margin-left 0.2s;min-width:0;}
#main.full{margin-left:0;}
header{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg);z-index:10;flex-wrap:wrap;}
#sidebar-toggle{width:28px;height:28px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
#sidebar-toggle:hover{background:var(--surface);}
#map-title-input{font-size:15px;font-weight:600;color:var(--text);border:none;outline:none;background:transparent;flex:1;min-width:80px;font-family:inherit;}
.hbtn{padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.hbtn:hover{background:var(--surface);color:var(--text);}
.hbtn:disabled{opacity:0.35;cursor:default;}
.hbtn.danger-active{border-color:var(--danger);color:var(--danger);}
.htools{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.hsep{width:0.5px;height:18px;background:var(--border);margin:0 2px;}

/* CANVAS */
#viewport{flex:1;position:relative;overflow:hidden;cursor:grab;background:var(--bg);}
#viewport.panning{cursor:grabbing;}
#world{position:absolute;top:0;left:0;transform-origin:0 0;
  background-image:radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size:26px 26px;
}
#edge-svg{position:absolute;top:0;left:0;overflow:visible;}
.edge-hit{stroke:transparent;stroke-width:14px;fill:none;cursor:pointer;}
.edge-line{stroke:var(--border-stronger);stroke-width:2px;fill:none;pointer-events:none;transition:stroke 0.1s;}
.edge-line.selected{stroke:var(--danger);stroke-width:2.5px;stroke-dasharray:5 3;}
.edge-draft{stroke:var(--accent);stroke-width:2px;stroke-dasharray:6 4;fill:none;pointer-events:none;}

.wm-node{position:absolute;min-width:150px;max-width:260px;padding:12px 14px 11px;border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);border:1.5px solid rgba(0,0,0,0.07);
  cursor:grab;user-select:none;background:#fff;}
.wm-node.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:6;transition:none;}
.wm-node.starter{border-color:var(--accent);border-width:2px;}
.wm-node-body{outline:none;font-size:14px;line-height:1.45;color:#241f19;white-space:pre-wrap;word-break:break-word;min-height:1.4em;cursor:text;}
.wm-node-body:empty:before{content:attr(data-placeholder);color:rgba(0,0,0,0.32);}
.wm-node-tools{position:absolute;top:-13px;right:8px;display:none;gap:4px;z-index:2;}
.wm-node:hover .wm-node-tools{display:flex;}
.wm-tool-btn{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.18);color:#6f6559;}
.wm-tool-btn:hover{background:var(--surface);}
.wm-tool-btn.del:hover{background:var(--danger);color:#fff;}
.wm-handle{position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:crosshair;display:none;z-index:2;}
.wm-node:hover .wm-handle{display:block;}

#empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-size:13px;
  text-align:center;pointer-events:none;white-space:nowrap;}

.zoom-label{font-size:11px;color:var(--text-muted);min-width:34px;text-align:center;}

@media(max-width:720px){
  #sidebar{transform:translateX(-220px);}
  #sidebar.force-visible{transform:translateX(0);}
  #main{margin-left:0;}
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-bg-orange"></div>
    <div class="login-bg-pink"></div>
    <div class="login-bg-yellow"></div>
    <div class="login-content">
      <div class="login-icon">🕸️</div>
      <div class="login-logo">viral<span>memo</span></div>
      <div class="login-sub">思いつきを、自由に広げる</div>
      <button class="google-btn" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <span style="font-size:16px;">🕸️</span>
    <h1>viral<span style="color:var(--accent);">memo</span></h1>
    <div id="user-icon"></div>
  </div>
  <div class="map-list" id="map-list"></div>
  <div class="sidebar-footer">
    <div class="sync-status" id="sync-status"></div>
    <button class="new-map-btn" onclick="newMap(null,true)">＋ 新しいマップ</button>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</div>

<div id="main">
  <header>
    <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="サイドバー">☰</button>
    <input id="map-title-input" oninput="onTitleInput()" placeholder="無題のマップ">
    <div class="htools">
      <button class="hbtn" id="undo-btn" onclick="undo()" title="元に戻す (Ctrl+Z)" disabled>↩</button>
      <button class="hbtn" id="redo-btn" onclick="redo()" title="やり直す (Ctrl+Y)" disabled>↪</button>
      <div class="hsep"></div>
      <button class="hbtn" onclick="addNodeAtCenter()">＋ ノード</button>
      <button class="hbtn" id="del-edge-btn" onclick="deleteSelectedEdge()" disabled title="選択した線を削除">🗑 線</button>
      <div class="hsep"></div>
      <button class="hbtn" onclick="zoomBy(0.85)">－</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="hbtn" onclick="zoomBy(1/0.85)">＋</button>
      <button class="hbtn" onclick="fitToView()" title="全体を表示">⤢ 全体</button>
      <div class="hsep"></div>
      <button class="hbtn" onclick="exportPNG()">⬇ 画像</button>
    </div>
  </header>
  <div id="viewport">
    <div id="world">
      <svg id="edge-svg"></svg>
    </div>
    <div id="empty-hint">ダブルクリックでアイデアを追加できます</div>
  </div>
</div>

<script>
/* ── SUPABASE（memotreeeeシリーズと同一プロジェクトを利用） ── */
const SUPA_URL='https://cundrwqsjoqhucnysbty.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1bmRyd3Fzam9xaHVjbnlzYnR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTEwOTksImV4cCI6MjA5ODI4NzA5OX0.jcnvmStYV77r1nPqf4HfNZqBLOdihR685OC0PLjDxxA';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let currentUser=null;

async function loginWithGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href}});
}
async function logout(){ await sb.auth.signOut(); location.reload(); }
function showLogin(){document.getElementById('login-screen').classList.add('visible');}
function hideLogin(){document.getElementById('login-screen').classList.remove('visible');}

function renderUserIcon(user){
  const el=document.getElementById('user-icon'); if(!el)return;
  const avatar=user?.user_metadata?.avatar_url;
  const name=user?.user_metadata?.full_name||user?.email||'';
  if(avatar){ el.innerHTML=`<img class="user-avatar" src="${avatar}" alt="${name}" title="${name}">`; }
  else{ const initial=(name[0]||'U').toUpperCase(); el.innerHTML=`<div class="user-avatar-placeholder" title="${name}">${initial}</div>`; }
}
function setSyncStatus(msg){ const el=document.getElementById('sync-status'); if(el) el.textContent=msg; }

/* ── STATE ──
   maps: [{id,title,nodes:[{id,x,y,text,color}],edges:[{id,from,to}],nextNodeId,nextEdgeId}]
*/
let maps=[], currentMapId=null, nextMapId=10;
let nodes=[], edges=[], nextNodeId=100, nextEdgeId=100;
const WORLD_W=4200, WORLD_H=3000;
let pan={x:0,y:0}, zoom=1;
let sidebarVisible=true;
let selectedEdgeId=null;

const PALETTE=['#ffffff','#FEF9C3','#DCFCE7','#DBEAFE','#FCE7F3','#FFEDD5','#F3E8FF'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nuid(){return nextNodeId++;}
function euid(){return nextEdgeId++;}
function muid(){return nextMapId++;}
function getMap(id){return maps.find(m=>m.id===id);}
function getCurrentMap(){return getMap(currentMapId);}
function getNode(id){return nodes.find(n=>n.id===id);}

/* ── UNDO/REDO ── */
let undoStack=[], redoStack=[];
function snapshot(){
  undoStack.push(JSON.stringify({nodes,edges,nextNodeId,nextEdgeId}));
  if(undoStack.length>50) undoStack.shift();
  redoStack=[]; updateUndoButtons();
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify({nodes,edges,nextNodeId,nextEdgeId}));
  const s=JSON.parse(undoStack.pop());
  nodes=s.nodes; edges=s.edges; nextNodeId=s.nextNodeId; nextEdgeId=s.nextEdgeId;
  selectedEdgeId=null; renderCanvas(); saveCurrent(); updateUndoButtons();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify({nodes,edges,nextNodeId,nextEdgeId}));
  const s=JSON.parse(redoStack.pop());
  nodes=s.nodes; edges=s.edges; nextNodeId=s.nextNodeId; nextEdgeId=s.nextEdgeId;
  selectedEdgeId=null; renderCanvas(); saveCurrent(); updateUndoButtons();
}
function updateUndoButtons(){
  const u=document.getElementById('undo-btn'), r=document.getElementById('redo-btn');
  if(u) u.disabled=undoStack.length===0;
  if(r) r.disabled=redoStack.length===0;
}

/* ── MAP MANAGEMENT ── */
function newMap(title,switchTo){
  const id=muid();
  const rootId=nuid();
  const rootNode={id:rootId,x:Math.round(WORLD_W/2-80),y:Math.round(WORLD_H/2-24),text:'メインテーマ',color:PALETTE[0],starter:true};
  const map={id,title:title||'', nodes:[rootNode], edges:[], nextNodeId:nuid(), nextEdgeId:euid()};
  maps.push(map);
  if(switchTo!==false){
    saveCurrent();
    currentMapId=id;
    renderSidebar(); renderMap(); centerView();
    setTimeout(()=>enterEdit(document.getElementById('t'+rootId),rootId),80);
  }
  return id;
}

function switchMap(id){
  saveCurrent(); currentMapId=id; selectedEdgeId=null;
  renderSidebar(); renderMap(); centerView();
}

function saveCurrent(){
  const map=getCurrentMap(); if(!map) return;
  map.nodes=nodes; map.edges=edges; map.nextNodeId=nextNodeId; map.nextEdgeId=nextEdgeId;
  const input=document.getElementById('map-title-input');
  if(input) map.title=input.value;
  saveLocal();
  clearTimeout(window.__syncTimer);
  window.__syncTimer=setTimeout(syncToCloud,1500);
}

function onTitleInput(){
  const map=getCurrentMap(); if(!map) return;
  map.title=document.getElementById('map-title-input').value;
  renderSidebar();
  saveCurrent();
}

function deleteMap(id,ev){
  if(ev) ev.stopPropagation();
  if(!confirm('このマップを削除しますか？元に戻せません。')) return;
  maps=maps.filter(m=>m.id!==id);
  deleteMapFromCloud(id);
  if(currentMapId===id){
    if(maps.length){ currentMapId=maps[0].id; }
    else { newMap('',false); currentMapId=maps[0].id; }
  }
  renderSidebar(); renderMap(); centerView(); saveCurrent();
}

function renderSidebar(){
  const list=document.getElementById('map-list');
  list.innerHTML=maps.map(m=>`
    <div class="map-item ${m.id===currentMapId?'active':''}" onclick="switchMap(${m.id})">
      <span class="map-item-icon"></span>
      <span class="map-item-title">${esc(m.title)||'無題のマップ'}</span>
      <button class="map-del" onclick="deleteMap(${m.id},event)" title="削除">✕</button>
    </div>
  `).join('');
}

function renderMap(){
  const map=getCurrentMap();
  if(!map){ nodes=[]; edges=[]; return; }
  nodes=map.nodes; edges=map.edges; nextNodeId=map.nextNodeId; nextEdgeId=map.nextEdgeId;
  document.getElementById('map-title-input').value=map.title||'';
  selectedEdgeId=null;
  renderCanvas();
}

/* ── CANVAS RENDER ── */
function applyTransform(){
  document.getElementById('world').style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
  document.getElementById('zoom-label').textContent=Math.round(zoom*100)+'%';
}

function renderCanvas(){
  const world=document.getElementById('world');
  world.style.width=WORLD_W+'px'; world.style.height=WORLD_H+'px';
  // ノード
  world.querySelectorAll('.wm-node').forEach(n=>n.remove());
  nodes.forEach(n=>world.appendChild(buildNodeEl(n)));
  document.getElementById('empty-hint').style.display=nodes.length?'none':'block';
  applyTransform();
  renderEdges();
}

function buildNodeEl(n){
  const div=document.createElement('div');
  div.className='wm-node'+(n.starter?' starter':'');
  div.id='n'+n.id;
  div.style.left=n.x+'px'; div.style.top=n.y+'px'; div.style.background=n.color||PALETTE[0];
  div.onmousedown=(e)=>startDragNode(e,n.id);
  div.innerHTML=`
    <div class="wm-node-tools">
      <button class="wm-tool-btn" title="色を変える" onmousedown="event.stopPropagation()" onclick="cycleColor(${n.id})">🎨</button>
      <button class="wm-tool-btn del" title="削除" onmousedown="event.stopPropagation()" onclick="deleteNode(${n.id})">✕</button>
    </div>
    <div class="wm-node-body" id="t${n.id}" contenteditable="false" data-placeholder="アイデアを入力…"
      ondblclick="enterEdit(this,${n.id});event.stopPropagation()"
      onblur="commitEdit(this,${n.id})"
      onmousedown="if(this.getAttribute('contenteditable')==='true')event.stopPropagation()"
      onkeydown="if(event.key==='Escape'){this.blur();}">${esc(n.text)}</div>
    <div class="wm-handle" title="ドラッグして線をつなぐ" onmousedown="startConnect(event,${n.id})"></div>
  `;
  return div;
}

function renderEdges(){
  const svg=document.getElementById('edge-svg');
  svg.setAttribute('width',WORLD_W); svg.setAttribute('height',WORLD_H);
  svg.setAttribute('viewBox',`0 0 ${WORLD_W} ${WORLD_H}`);
  svg.innerHTML='';
  edges.forEach(e=>svg.appendChild(buildEdgeGroup(e)));
  updateDelEdgeBtn();
}

function nodeCenter(id){
  const el=document.getElementById('n'+id);
  const n=getNode(id);
  if(!n) return {x:0,y:0};
  const w=el?el.offsetWidth:170, h=el?el.offsetHeight:60;
  return {x:n.x+w/2, y:n.y+h/2};
}

function buildEdgeGroup(e){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('data-eid',e.id);
  const a=nodeCenter(e.from), b=nodeCenter(e.to);
  const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
  hit.setAttribute('class','edge-hit');
  hit.setAttribute('x1',a.x);hit.setAttribute('y1',a.y);hit.setAttribute('x2',b.x);hit.setAttribute('y2',b.y);
  hit.onclick=(ev)=>{ev.stopPropagation();selectEdge(e.id);};
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('class','edge-line'+(selectedEdgeId===e.id?' selected':''));
  line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);
  g.appendChild(line); g.appendChild(hit);
  return g;
}

function updateEdgesFor(nodeId){
  edges.forEach(e=>{
    if(e.from===nodeId||e.to===nodeId){
      const g=document.querySelector(`#edge-svg g[data-eid="${e.id}"]`);
      if(!g) return;
      const a=nodeCenter(e.from), b=nodeCenter(e.to);
      const [line,hit]=g.children;
      line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);
      hit.setAttribute('x1',a.x);hit.setAttribute('y1',a.y);hit.setAttribute('x2',b.x);hit.setAttribute('y2',b.y);
    }
  });
}

/* ── ノード操作 ── */
function enterEdit(el,id){
  snapshot();
  el.setAttribute('contenteditable','true');
  el.focus();
  document.execCommand('selectAll',false,null);
}
function commitEdit(el,id){
  el.setAttribute('contenteditable','false');
  const n=getNode(id); if(!n) return;
  n.text=el.innerText.replace(/\u00a0/g,' ');
  saveCurrent();
}
function cycleColor(id){
  snapshot();
  const n=getNode(id); if(!n) return;
  const idx=PALETTE.indexOf(n.color||PALETTE[0]);
  n.color=PALETTE[(idx+1)%PALETTE.length];
  document.getElementById('n'+id).style.background=n.color;
  saveCurrent();
}
function deleteNode(id){
  snapshot();
  nodes=nodes.filter(n=>n.id!==id);
  edges=edges.filter(e=>e.from!==id&&e.to!==id);
  if(selectedEdgeId&&!edges.find(e=>e.id===selectedEdgeId)) selectedEdgeId=null;
  renderCanvas(); saveCurrent();
}
function addNodeAt(worldX,worldY){
  snapshot();
  const id=nuid();
  nodes.push({id,x:Math.round(worldX-80),y:Math.round(worldY-24),text:'',color:PALETTE[0]});
  renderCanvas(); saveCurrent();
  setTimeout(()=>enterEdit(document.getElementById('t'+id),id),50);
}
function addNodeAtCenter(){
  const vp=document.getElementById('viewport').getBoundingClientRect();
  const wx=(vp.width/2-pan.x)/zoom, wy=(vp.height/2-pan.y)/zoom;
  addNodeAt(wx,wy);
}

/* ── エッジ選択・削除 ── */
function selectEdge(id){
  selectedEdgeId=id;
  document.querySelectorAll('.edge-line').forEach(l=>l.classList.remove('selected'));
  const g=document.querySelector(`#edge-svg g[data-eid="${id}"]`);
  if(g) g.querySelector('.edge-line').classList.add('selected');
  updateDelEdgeBtn();
}
function clearEdgeSelection(){
  selectedEdgeId=null;
  document.querySelectorAll('.edge-line').forEach(l=>l.classList.remove('selected'));
  updateDelEdgeBtn();
}
function updateDelEdgeBtn(){
  const b=document.getElementById('del-edge-btn');
  if(b) b.disabled=(selectedEdgeId===null);
}
function deleteSelectedEdge(){
  if(selectedEdgeId===null) return;
  snapshot();
  edges=edges.filter(e=>e.id!==selectedEdgeId);
  selectedEdgeId=null;
  renderEdges(); saveCurrent();
}

/* ── ドラッグ（ノード移動／接続／パン） ── */
let drag=null; // {type:'node'|'pan'|'connect', ...}

function startDragNode(e,id){
  if(e.button!==0) return;
  const t=e.target;
  if(t.closest('.wm-tool-btn')||t.closest('.wm-handle')) return;
  if(t.classList.contains('wm-node-body')&&t.getAttribute('contenteditable')==='true') return;
  e.preventDefault();
  clearEdgeSelection();
  const n=getNode(id); if(!n) return;
  drag={type:'node',id,startX:e.clientX,startY:e.clientY,origX:n.x,origY:n.y,moved:false};
  document.getElementById('n'+id).classList.add('dragging');
}

function startConnect(e,id){
  if(e.button!==0) return;
  e.stopPropagation(); e.preventDefault();
  clearEdgeSelection();
  drag={type:'connect',from:id};
  const svg=document.getElementById('edge-svg');
  const draft=document.createElementNS('http://www.w3.org/2000/svg','line');
  draft.setAttribute('id','edge-draft'); draft.setAttribute('class','edge-draft');
  const a=nodeCenter(id);
  draft.setAttribute('x1',a.x);draft.setAttribute('y1',a.y);draft.setAttribute('x2',a.x);draft.setAttribute('y2',a.y);
  svg.appendChild(draft);
}

document.addEventListener('mousedown',(e)=>{
  if(drag) return;
  const vp=document.getElementById('viewport');
  if(e.target===vp||e.target.id==='world'||e.target.id==='edge-svg'){
    if(e.button!==0) return;
    clearEdgeSelection();
    drag={type:'pan',startX:e.clientX,startY:e.clientY,origX:pan.x,origY:pan.y};
    vp.classList.add('panning');
  }
});

document.addEventListener('mousemove',(e)=>{
  if(!drag) return;
  if(drag.type==='node'){
    const dx=(e.clientX-drag.startX)/zoom, dy=(e.clientY-drag.startY)/zoom;
    if(Math.abs(dx)>2||Math.abs(dy)>2) drag.moved=true;
    const n=getNode(drag.id); if(!n) return;
    n.x=Math.round(drag.origX+dx); n.y=Math.round(drag.origY+dy);
    const el=document.getElementById('n'+drag.id);
    el.style.left=n.x+'px'; el.style.top=n.y+'px';
    updateEdgesFor(drag.id);
  } else if(drag.type==='pan'){
    pan.x=drag.origX+(e.clientX-drag.startX);
    pan.y=drag.origY+(e.clientY-drag.startY);
    applyTransform();
  } else if(drag.type==='connect'){
    const vp=document.getElementById('viewport').getBoundingClientRect();
    const wx=(e.clientX-vp.left-pan.x)/zoom, wy=(e.clientY-vp.top-pan.y)/zoom;
    const draft=document.getElementById('edge-draft');
    if(draft){ draft.setAttribute('x2',wx); draft.setAttribute('y2',wy); }
  }
});

document.addEventListener('mouseup',(e)=>{
  if(!drag) return;
  if(drag.type==='node'){
    document.getElementById('n'+drag.id)?.classList.remove('dragging');
    if(drag.moved){ snapshotAfterMove(drag.id,drag.origX,drag.origY); saveCurrent(); }
  } else if(drag.type==='pan'){
    document.getElementById('viewport').classList.remove('panning');
  } else if(drag.type==='connect'){
    document.getElementById('edge-draft')?.remove();
    const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('.wm-node');
    if(target){
      const toId=parseInt(target.id.slice(1),10);
      if(toId!==drag.from && !edges.some(ed=>(ed.from===drag.from&&ed.to===toId)||(ed.from===toId&&ed.to===drag.from))){
        snapshot();
        edges.push({id:euid(),from:drag.from,to:toId});
        renderEdges(); saveCurrent();
      }
    }
  }
  drag=null;
});

// ノードのドラッグ開始前の状態をundo用に記録（移動が実際に起きた場合のみ）
function snapshotAfterMove(id,origX,origY){
  const n=getNode(id); if(!n) return;
  const restored=nodes.map(nd=>nd.id===id?{...nd,x:origX,y:origY}:nd);
  undoStack.push(JSON.stringify({nodes:restored,edges,nextNodeId,nextEdgeId}));
  if(undoStack.length>50) undoStack.shift();
  redoStack=[]; updateUndoButtons();
}

/* ダブルクリックで新規ノード */
document.getElementById('viewport').addEventListener('dblclick',(e)=>{
  if(e.target.closest('.wm-node')) return;
  const vp=document.getElementById('viewport').getBoundingClientRect();
  const wx=(e.clientX-vp.left-pan.x)/zoom, wy=(e.clientY-vp.top-pan.y)/zoom;
  addNodeAt(wx,wy);
});

/* ── ズーム ── */
function zoomBy(factor,cx,cy){
  const vp=document.getElementById('viewport').getBoundingClientRect();
  const localX=cx!==undefined?cx-vp.left:vp.width/2;
  const localY=cy!==undefined?cy-vp.top:vp.height/2;
  const wx=(localX-pan.x)/zoom, wy=(localY-pan.y)/zoom;
  zoom=Math.max(0.25,Math.min(2.5,zoom*factor));
  pan.x=localX-wx*zoom; pan.y=localY-wy*zoom;
  applyTransform();
}
document.getElementById('viewport').addEventListener('wheel',(e)=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.1:0.9;
  zoomBy(factor,e.clientX,e.clientY);
},{passive:false});

function centerView(){
  const vp=document.getElementById('viewport').getBoundingClientRect();
  zoom=1;
  pan.x=Math.round(vp.width/2-WORLD_W/2);
  pan.y=Math.round(vp.height/2-WORLD_H/2);
  applyTransform();
}

function fitToView(){
  if(!nodes.length){ centerView(); return; }
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    const el=document.getElementById('n'+n.id);
    const w=el?el.offsetWidth:170,h=el?el.offsetHeight:60;
    minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+w);maxY=Math.max(maxY,n.y+h);
  });
  const pad=60; minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const vp=document.getElementById('viewport').getBoundingClientRect();
  const bw=maxX-minX, bh=maxY-minY;
  zoom=Math.max(0.25,Math.min(2.5, Math.min(vp.width/bw, vp.height/bh)));
  pan.x=Math.round(vp.width/2-(minX+bw/2)*zoom);
  pan.y=Math.round(vp.height/2-(minY+bh/2)*zoom);
  applyTransform();
}

/* ── サイドバー開閉 ── */
function toggleSidebar(){
  sidebarVisible=!sidebarVisible;
  document.getElementById('sidebar').classList.toggle('hidden',!sidebarVisible);
  document.getElementById('sidebar').classList.toggle('force-visible',sidebarVisible);
  document.getElementById('main').classList.toggle('full',!sidebarVisible);
}

/* ── キーボード ── */
document.addEventListener('keydown',(e)=>{
  const active=document.activeElement;
  const editing=active&&active.getAttribute&&active.getAttribute('contenteditable')==='true';
  if(!editing && (e.key==='Delete'||e.key==='Backspace') && selectedEdgeId!==null){
    e.preventDefault(); deleteSelectedEdge();
  }
  if(!editing && e.key==='Escape'){ clearEdgeSelection(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey&&!editing){ e.preventDefault(); undo(); }
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))&&!editing){ e.preventDefault(); redo(); }
});

/* ── 画像エクスポート ── */
async function exportPNG(){
  if(!nodes.length){ alert('ノードがありません'); return; }
  const pad=60;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    const el=document.getElementById('n'+n.id);
    const w=el?el.offsetWidth:170,h=el?el.offsetHeight:60;
    minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+w);maxY=Math.max(maxY,n.y+h);
  });
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const w=Math.round(maxX-minX), h=Math.round(maxY-minY);
  const clone=document.getElementById('world').cloneNode(true);
  clone.style.transform=`translate(${-minX}px,${-minY}px) scale(1)`;
  clone.style.width=w+'px'; clone.style.height=h+'px';
  clone.querySelectorAll('[contenteditable]').forEach(el=>el.removeAttribute('contenteditable'));
  clone.querySelectorAll('.wm-node-tools,.wm-handle').forEach(el=>el.remove());
  const bg=getComputedStyle(document.body).getPropertyValue('--bg')||'#fffdfb';
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:fixed;left:-99999px;top:0;width:${w}px;height:${h}px;overflow:hidden;background:${bg};`;
  wrap.appendChild(clone);
  document.body.appendChild(wrap);
  try{
    const canvas=await html2canvas(wrap,{backgroundColor:null,scale:2});
    const a=document.createElement('a');
    a.download=((getCurrentMap()?.title)||'viralmemo')+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  }catch(err){ console.error(err); alert('書き出しに失敗しました'); }
  finally{ wrap.remove(); }
}

/* ── ローカル保存／クラウド同期 ── */
function saveLocal(){
  try{ localStorage.setItem('viralmemo-v1',JSON.stringify({maps,currentMapId,nextMapId,nextNodeId,nextEdgeId})); }catch(e){}
}
function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem('viralmemo-v1')||'null');
    if(!d||!d.maps||!d.maps.length) return false;
    maps=d.maps; currentMapId=d.currentMapId; nextMapId=d.nextMapId||10;
    return true;
  }catch(e){ return false; }
}

async function syncToCloud(){
  if(!currentUser) return;
  setSyncStatus('同期中…');
  try{
    for(const map of maps){
      const row={
        user_id:currentUser.id,
        map_id:map.id,
        title:map.title||'',
        nodes:map.nodes,
        edges:map.edges,
        next_node_id:map.nextNodeId||100,
        next_edge_id:map.nextEdgeId||100,
        updated_at:new Date().toISOString()
      };
      const {error}=await sb.from('webmaps').upsert(row,{onConflict:'user_id,map_id'});
      if(error) throw error;
    }
    setSyncStatus('✓ 同期済み');
  }catch(e){ setSyncStatus('⚠ 同期失敗'); console.error(e); }
}

async function loadFromCloud(){
  if(!currentUser) return false;
  setSyncStatus('読み込み中…');
  try{
    const {data,error}=await sb.from('webmaps').select('*').eq('user_id',currentUser.id).order('map_id');
    if(error) throw error;
    if(data&&data.length){
      maps=data.map(r=>({
        id:r.map_id, title:r.title, nodes:r.nodes||[], edges:r.edges||[],
        nextNodeId:r.next_node_id||100, nextEdgeId:r.next_edge_id||100
      }));
      nextMapId=Math.max(...maps.map(m=>m.id))+1;
      currentMapId=maps[0].id;
      setSyncStatus('✓ 同期済み');
      return true;
    }
    setSyncStatus(''); return false;
  }catch(e){ setSyncStatus('⚠ 読み込み失敗'); console.error(e); return false; }
}

async function deleteMapFromCloud(id){
  if(!currentUser) return;
  await sb.from('webmaps').delete().eq('user_id',currentUser.id).eq('map_id',id);
}

/* ── INIT ── */
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ showLogin(); return; }
  currentUser=session.user;
  hideLogin();
  renderUserIcon(currentUser);

  const loaded=await loadFromCloud();
  if(!loaded){
    if(!loadLocal()){ newMap('マイマップ',false); currentMapId=maps[0].id; }
  }
  renderSidebar();
  renderMap();
  centerView();
}

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN'&&session){
    currentUser=session.user; hideLogin(); renderUserIcon(currentUser); init();
  }
  if(event==='SIGNED_OUT'){ currentUser=null; showLogin(); }
});

window.addEventListener('resize',()=>{ applyTransform(); });
window.addEventListener('beforeunload',saveCurrent);
init();
</script>
